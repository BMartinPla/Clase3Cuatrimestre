<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
    <script src="funciones.js" defer></script>
</head>
<body>
    <div class="header">
        <div class="brand">AppCalc</div>
    </div>

    <div class="calculadora">
        <div class="container-marca">
            <div class="marca" onclick="window.open('https://www.casio.com/latin/', '_blank')">CASIO</div>
        </div>
        <div class="container-pantalla">
            <div class="fondo-pantalla">
                <div class="funciones">M / E</div>
                <div class="pantalla" id="pantalla" role="status" aria-live="polite">0</div>
            </div>
        </div>
        <div class="container-boton">
            <button type="button" class="boton out">%</button>
            <button type="button" class="boton del">CE</button>
            <button type="button" class="boton del">C</button>
            <button type="button" class="boton del">DEL</button>
            <button type="button" class="boton out">1/x</button>
            <button type="button" class="boton out">x²</button>
            <button type="button" class="boton out">²v(x)</button>
            <button type="button" class="boton out">/</button>
            <button type="button" class="boton">7</button>
            <button type="button" class="boton">8</button>
            <button type="button" class="boton">9</button>
            <button type="button" class="boton out">x</button>
            <button type="button" class="boton">4</button>
            <button type="button" class="boton">5</button>
            <button type="button" class="boton">6</button>
            <button type="button" class="boton out">-</button>
            <button type="button" class="boton">1</button>
            <button type="button" class="boton">2</button>
            <button type="button" class="boton">3</button>
            <button type="button" class="boton out">+</button>
            <button type="button" class="boton out">+/-</button>
            <button type="button" class="boton">0</button>
            <button type="button" class="boton out coma">,</button>
            <button type="button" class="boton out igual">=</button>
        </div>
    </div>

    <div class="footer">
        <div class="made">Made with HTML + CSS</div>
        <div class="rights" onclick="window.open('https://www.instagram.com/plabraian/', '_blank')">DERECHOS RESERVADOS</div>
    </div>


    
</body>
</html>
