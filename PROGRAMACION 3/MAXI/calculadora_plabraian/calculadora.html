<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
    <div class="header">
        <div class="brand">AppCalc</div>
    </div>

    <div class="calculadora">
        <div class="container-marca">
            <div class="marca" onclick="window.open('https://www.casio.com/latin/', '_blank')">CASIO</div>
        </div>
        <div class="container-pantalla">
            <div class="fondo-pantalla">
                <div class="funciones">M / E</div>
                <div class="pantalla"> 1 + 5 x 42</div>
            </div>
        </div>
        <div class="container-boton">
            <div class="boton out">%</div>
            <div class="boton del">CE</div>
            <div class="boton del">C</div>
            <div class="boton out">DEL</div>
            <div class="boton out">1/x</div>
            <div class="boton out">x²</div>
            <div class="boton out">²v(x)</div>
            <div class="boton out">/</div>
            <div class="boton">7</div>
            <div class="boton">8</div>
            <div class="boton">9</div>
            <div class="boton out">x</div>
            <div class="boton">4</div>
            <div class="boton">5</div>
            <div class="boton">6</div>
            <div class="boton out">-</div>
            <div class="boton">1</div>
            <div class="boton">2</div>
            <div class="boton">3</div>
            <div class="boton out">+</div>
            <div class="boton out">+/-</div>
            <div class="boton">0</div>
            <div class="boton out coma">,</div>
            <div class="boton out igual">=</div>
        </div>
    </div>

    <div class="footer">
        <div class="made">Made with HTML + CSS</div>
        <div class="rights" onclick="window.open('https://www.instagram.com/plabraian/', '_blank')">DERECHOS RESERVADOS</div>
    </div>


    
</body>
</html>
